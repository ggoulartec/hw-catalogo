<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hot Wheels | Catálogo de Vendas</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.3/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>

<body>
  <div class="page-shell">
    <main>
      <section class="selection-panel" aria-label="Seleção de Hot Wheels">
        <div class="selection-panel__header">
          <div>
            <p class="section-label">Seleção</p>
            <h3>Escolha um ou mais modelos</h3>
          </div>
          <div class="header-actions">
            <button id="selectAllPage" class="ghost-btn">Selecionar pág. atual</button>
            <button id="selectAll" class="ghost-btn">Selecionar todos</button>
            <button id="clearSelection" class="ghost-btn">Limpar</button>
          </div>
        </div>
        <div class="selection-panel__body">
          <label class="form-field" for="carSelect">
            <span>Hot Wheels</span>
            <select id="carSelect">
              <option value="">Selecione um carrinho</option>
            </select>
          </label>

          <div id="selectedCarsList" class="selected-cars-list"></div>
          <div id="selectionSummary" class="selection-summary" style="display: none;"></div>

          <div class="action-buttons">
            <button id="whatsappBtn" class="primary-btn" disabled>Enviar pelo WhatsApp</button>
            <button id="downloadBtn" class="secondary-btn" disabled>Criar lista</button>
            <button id="downloadImagesBtn" class="secondary-btn" disabled>Baixar Cards (PNG)</button>
          </div>
        </div>
      </section>

      <section class="filter-section">
        <div class="filter-container">
          <label for="searchInput" class="filter-label">
            <span>🔍 Buscar por nome</span>
          </label>
          <input type="text" id="searchInput" placeholder="Digite o nome do Hot Wheels..." class="search-input" />
          <button id="clearFilter" class="filter-clear-btn" style="display: none;">Limpar busca</button>
        </div>
      </section>

      <section class="cards-grid" id="catalog"></section>
      <div id="pagination" class="pagination-container"></div>
    </main>
  </div>

  <script>
    let cars = [];
    let filteredCars = [];
    let currentPage = 1;
    const itemsPerPage = 12;
    let searchFilter = '';

    const catalog = document.getElementById('catalog');
    const searchInput = document.getElementById('searchInput');
    const clearFilterBtn = document.getElementById('clearFilter');
    const carSelect = document.getElementById('carSelect');
    const selectedCarsList = document.getElementById('selectedCarsList');
    const selectionSummary = document.getElementById('selectionSummary');
    const whatsappBtn = document.getElementById('whatsappBtn');
    const downloadBtn = document.getElementById('downloadBtn');
    const selectAllBtn = document.getElementById('selectAll');
    const clearSelectionBtn = document.getElementById('clearSelection');
    const selectAllPageBtn = document.getElementById('selectAllPage');
    const downloadImagesBtn = document.getElementById('downloadImagesBtn');
    let selectedCars = [];

    const formatPrice = (value) => value.toLocaleString('pt-BR', {
      style: 'currency',
      currency: 'BRL'
    });

    const getSpecialBorderClass = (car) => {
      const segment = String(car.segment || '').toLowerCase();
      const series = String(car.series || '').toLowerCase();
      const rarity = String(car.rarity || '').toLowerCase();
      const assortment = String(car.assortment || '').toLowerCase();
      const isSilverSeries = segment.includes('silver series');
      const isPremiumSeries = segment.includes('premium');
      const is100PercentSeries = assortment.includes('100%');
      const isTreasureHuntSeries = /treasure hunts?/i.test(series);
      const isTreasureHuntRarity = rarity.includes('treasure hunt') || rarity.includes('chase');

      if (isSilverSeries || isTreasureHuntRarity) return 'silver-border';
      if (isPremiumSeries || isTreasureHuntSeries) return 'gold-border';
      if (is100PercentSeries) return 'red-border';
      return '';
    };

    const getSpecialBadgeLabel = (car) => {
      const segment = String(car.segment || '').toLowerCase();
      const rarity = String(car.rarity || '').trim();
      const series = String(car.series || '').toLowerCase();
      const assortment = String(car.assortment || '').toLowerCase();

      if (segment.includes('silver series')) return 'Silver Series';
      if (segment.includes('premium')) return 'Premium';
      if (assortment.includes('100%')) return '100%';
      if (rarity.toLowerCase().includes('treasure hunt')) return 'Treasure Hunt';
      if (rarity.toLowerCase().includes('chase')) return 'Chase';
      if (/treasure hunts?/i.test(series)) return 'Treasure Hunt';
      if (rarity) return rarity;
      return '';
    };

    const getSpecialBadgeClass = (car) => {
      const segment = String(car.segment || '').toLowerCase();
      const rarity = String(car.rarity || '').toLowerCase();
      const assortment = String(car.assortment || '').toLowerCase();

      if (segment.includes('premium')) return 'gold-badge';
      if (segment.includes('silver series') || rarity.includes('treasure hunt') || rarity.includes('chase')) return 'silver-badge';
      if (assortment.includes('100%')) return 'red-badge';
      return 'default-badge';
    };

    const buildCarText = (car) => {
      return [
        `Hot Wheels: ${car.name}`,
        `Preço: ${formatPrice(car.price)}`,
        `Release year: ${car.release_year}`,
        `Segment: ${car.segment}`,
        `Assortment: ${car.assortment}`,
        `Series: ${car.series}`,
        `Base color: ${car.base_color}`,
        `Body color: ${car.body_color}`,
        `Window color: ${car.window_color}`,
        `Interior color: ${car.interior_color}`,
        `Base material: ${car.base_material}`,
        `Scale: ${car.scale}`
      ].join('\n');
    };

    const buildSelectionText = () => {
      return selectedCars.map((car, index) => `${index + 1}. ${buildCarText(car)}`).join('\n\n');
    };

    const exportToExcel = () => {
      if (!selectedCars.length) return;

      const rows = selectedCars.map((car) => [
        car.name,
        car.price, // Export raw numeric price for calculation
        car.release_year,
        car.segment,
        car.assortment,
        car.series,
        car.base_color,
        car.body_color,
        car.window_color,
        car.interior_color,
        car.base_material,
        car.scale,
        car.observation || ''
      ]);

      const headers = [
        'Modelo',
        'Preço',
        'Release Year',
        'Segment',
        'Assortment',
        'Series',
        'Base Color',
        'Body Color',
        'Window Color',
        'Interior Color',
        'Base Material',
        'Scale',
        'Observações'
      ];

      const worksheet = XLSX.utils.aoa_to_sheet([headers, ...rows]);
      worksheet['!autofilter'] = { ref: `A1:M${rows.length + 1}` };
      worksheet['!cols'] = [
        { wch: 24 }, { wch: 14 }, { wch: 14 }, { wch: 16 }, { wch: 16 }, { wch: 18 }, { wch: 16 }, { wch: 16 }, { wch: 16 }, { wch: 18 }, { wch: 18 }, { wch: 10 }, { wch: 28 }
      ];

      const headerStyle = {
        font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 },
        fill: { fgColor: { rgb: 'FF2C3E50' } },
        alignment: { horizontal: 'center', vertical: 'center', wrapText: true },
        border: {
          top: { style: 'thin', color: { rgb: 'FF2C3E50' } },
          bottom: { style: 'thin', color: { rgb: 'FF2C3E50' } },
          left: { style: 'thin', color: { rgb: 'FF2C3E50' } },
          right: { style: 'thin', color: { rgb: 'FF2C3E50' } }
        }
      };

      const dataStyle = {
        font: { sz: 11 },
        alignment: { vertical: 'center', wrapText: true },
        border: {
          top: { style: 'thin', color: { rgb: 'FFD0D7DE' } },
          bottom: { style: 'thin', color: { rgb: 'FFD0D7DE' } },
          left: { style: 'thin', color: { rgb: 'FFD0D7DE' } },
          right: { style: 'thin', color: { rgb: 'FFD0D7DE' } }
        }
      };

      const summaryStyle = {
        font: { bold: true, color: { rgb: 'FFFFFF' }, sz: 12 },
        fill: { fgColor: { rgb: 'FFE8A23B' } },
        alignment: { horizontal: 'center', vertical: 'center' },
        border: {
          top: { style: 'thin', color: { rgb: 'FFE8A23B' } },
          bottom: { style: 'thin', color: { rgb: 'FFE8A23B' } },
          left: { style: 'thin', color: { rgb: 'FFE8A23B' } },
          right: { style: 'thin', color: { rgb: 'FFE8A23B' } }
        }
      };

      headers.forEach((_, index) => {
        const cellRef = XLSX.utils.encode_cell({ r: 0, c: index });
        worksheet[cellRef].s = headerStyle;
      });

      rows.forEach((_, rowIndex) => {
        headers.forEach((_, colIndex) => {
          const cellRef = XLSX.utils.encode_cell({ r: rowIndex + 1, c: colIndex });
          if (worksheet[cellRef]) {
            worksheet[cellRef].s = dataStyle;
            if (colIndex === 1) { // Format price cells as currency in Excel
              worksheet[cellRef].z = 'R$ #,##0.00';
            }
          }
        });
      });

      const totalQty = selectedCars.length;
      const totalPrice = selectedCars.reduce((sum, car) => sum + (Number(car.price) || 0), 0);
      const totalCell = XLSX.utils.encode_cell({ r: rows.length + 2, c: 0 });
      const priceTotalCell = XLSX.utils.encode_cell({ r: rows.length + 2, c: 1 });
      const qtyCell = XLSX.utils.encode_cell({ r: rows.length + 2, c: 11 });
      const noteCell = XLSX.utils.encode_cell({ r: rows.length + 2, c: 12 });
      worksheet[totalCell] = { t: 's', v: 'Quantidade total de miniaturas' };
      // Assign formula and calculated value for spreadsheet total price
      worksheet[priceTotalCell] = {
        t: 'n',
        f: `SUM(B2:B${rows.length + 1})`,
        v: totalPrice,
        z: 'R$ #,##0.00'
      };
      worksheet[qtyCell] = { t: 'n', v: totalQty };
      worksheet[noteCell] = { t: 's', v: 'Seleção premium' };
      worksheet[totalCell].s = summaryStyle;
      worksheet[priceTotalCell].s = summaryStyle;
      worksheet[qtyCell].s = summaryStyle;
      worksheet[noteCell].s = summaryStyle;

      const workbook = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(workbook, worksheet, 'Hot Wheels');
      XLSX.writeFile(workbook, 'hotwheels_selecao.xlsx');
    };

    const renderSelectedCars = () => {
      if (!selectedCars.length) {
        selectedCarsList.innerHTML = '<p class="empty-selection">Nenhum modelo selecionado ainda.</p>';
        selectionSummary.style.display = 'none';
        whatsappBtn.disabled = true;
        downloadBtn.disabled = true;
        downloadImagesBtn.disabled = true;
        return;
      }

      selectedCarsList.innerHTML = selectedCars.map((car) => `
        <div class="selected-car-pill">
          <span>${car.name}</span>
          <small>${formatPrice(car.price)}</small>
        </div>
      `).join('');

      const totalQty = selectedCars.length;
      const totalPrice = selectedCars.reduce((sum, car) => sum + (Number(car.price) || 0), 0);

      selectionSummary.innerHTML = `
        <div class="summary-item">
          <span>Total de itens:</span>
          <strong>${totalQty} ${totalQty === 1 ? 'miniatura' : 'miniaturas'}</strong>
        </div>
        <div class="summary-item">
          <span>Valor total:</span>
          <strong class="total-price">${formatPrice(totalPrice)}</strong>
        </div>
      `;
      selectionSummary.style.display = 'flex';

      whatsappBtn.disabled = false;
      downloadBtn.disabled = false;
      downloadImagesBtn.disabled = false;
    };

    const populateDropdown = () => {
      carSelect.innerHTML = '<option value="">Selecione um carrinho</option>';
      cars.forEach((car) => {
        const option = document.createElement('option');
        option.value = car.id;
        const suffix = car.release_year ? ` (${car.release_year})` : '';
        option.textContent = `${car.name}${suffix}`;
        carSelect.appendChild(option);
      });
    };

    const renderPagination = (totalPages) => {
      const pagination = document.getElementById('pagination');
      pagination.innerHTML = '';

      if (totalPages <= 1) return;

      // Botão Anterior
      const prevBtn = document.createElement('button');
      prevBtn.className = 'pagination-btn';
      prevBtn.textContent = '« Anterior';
      prevBtn.disabled = currentPage === 1;
      prevBtn.addEventListener('click', () => {
        if (currentPage > 1) {
          currentPage--;
          renderPage(currentPage);
          updateCardSelectionState();
          window.scrollTo({ top: catalog.offsetTop - 100, behavior: 'smooth' });
        }
      });
      pagination.appendChild(prevBtn);

      // Função auxiliar para adicionar botão de página
      const addPageButton = (p) => {
        const btn = document.createElement('button');
        btn.className = 'pagination-btn';
        if (p === currentPage) {
          btn.classList.add('active-page');
        }
        btn.textContent = p;
        btn.addEventListener('click', () => {
          currentPage = p;
          renderPage(currentPage);
          updateCardSelectionState();
          window.scrollTo({ top: catalog.offsetTop - 100, behavior: 'smooth' });
        });
        pagination.appendChild(btn);
      };

      const addEllipsis = () => {
        const span = document.createElement('span');
        span.className = 'pagination-info';
        span.textContent = '...';
        pagination.appendChild(span);
      };

      // Janela inteligente de paginação
      const pagesToShow = [];
      const range = 1; // páginas ao redor da atual

      for (let i = 1; i <= totalPages; i++) {
        if (i === 1 || i === totalPages || (i >= currentPage - range && i <= currentPage + range)) {
          pagesToShow.push(i);
        }
      }

      let lastPage = null;
      pagesToShow.forEach((p) => {
        if (lastPage !== null) {
          if (p - lastPage === 2) {
            addPageButton(p - 1);
          } else if (p - lastPage > 2) {
            addEllipsis();
          }
        }
        addPageButton(p);
        lastPage = p;
      });

      // Botão Próximo
      const nextBtn = document.createElement('button');
      nextBtn.className = 'pagination-btn';
      nextBtn.textContent = 'Próximo »';
      nextBtn.disabled = currentPage === totalPages;
      nextBtn.addEventListener('click', () => {
        if (currentPage < totalPages) {
          currentPage++;
          renderPage(currentPage);
          updateCardSelectionState();
          window.scrollTo({ top: catalog.offsetTop - 100, behavior: 'smooth' });
        }
      });
      pagination.appendChild(nextBtn);

      // Ir para a página desejada
      const jumpContainer = document.createElement('div');
      jumpContainer.className = 'pagination-jump';

      const jumpTextStart = document.createElement('span');
      jumpTextStart.textContent = 'Ir para:';
      jumpContainer.appendChild(jumpTextStart);

      const jumpInput = document.createElement('input');
      jumpInput.type = 'number';
      jumpInput.className = 'pagination-input';
      jumpInput.min = 1;
      jumpInput.max = totalPages;
      jumpInput.value = currentPage;

      const goToPage = () => {
        let pageVal = parseInt(jumpInput.value, 10);
        if (isNaN(pageVal)) return;
        if (pageVal < 1) pageVal = 1;
        if (pageVal > totalPages) pageVal = totalPages;

        currentPage = pageVal;
        renderPage(currentPage);
        updateCardSelectionState();
        window.scrollTo({ top: catalog.offsetTop - 100, behavior: 'smooth' });
      };

      jumpInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
          goToPage();
        }
      });
      jumpContainer.appendChild(jumpInput);

      const jumpTextEnd = document.createElement('span');
      jumpTextEnd.textContent = `de ${totalPages}`;
      jumpContainer.appendChild(jumpTextEnd);

      const jumpBtn = document.createElement('button');
      jumpBtn.className = 'pagination-btn pagination-go-btn';
      jumpBtn.textContent = 'Ir';
      jumpBtn.addEventListener('click', goToPage);
      jumpContainer.appendChild(jumpBtn);

      pagination.appendChild(jumpContainer);
    };

    const renderPage = (pageNumber) => {
      currentPage = pageNumber;
      catalog.innerHTML = '';

      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = Math.min(startIndex + itemsPerPage, filteredCars.length);
      const pageCars = filteredCars.slice(startIndex, endIndex);
      pageCars.forEach((car) => {
        const card = document.createElement('article');
        card.className = 'car-card';

        const borderClass = getSpecialBorderClass(car);
        if (borderClass) {
          card.classList.add(borderClass);
        }

        const badgeLabel = getSpecialBadgeLabel(car);
        const badgeClass = badgeLabel ? getSpecialBadgeClass(car) : '';
        const badgeMarkup = badgeLabel ? `<span class="special-badge ${badgeClass}">${badgeLabel}</span>` : '';

        card.innerHTML = `
          <div class="car-card__image" style="background-image: url('${car.image}');" role="img" aria-label="${car.name}"></div>
          <div class="card-body">
            <div class="card-top">
              <div>
                <p class="card-category">${car.segment}</p>
                <h3>${car.name}</h3>
              </div>
              <span class="price">${formatPrice(car.price)}</span>
            </div>
            ${badgeMarkup}
            <div class="spec-grid">
              <div><span>Release</span><strong>${car.release_year}</strong></div>
              <div><span>Assortment</span><strong>${car.assortment}</strong></div>
              <div><span>Series</span><strong>${car.series}</strong></div>
              <div><span>Scale</span><strong>${car.scale}</strong></div>
              <div><span>Base color</span><strong>${car.base_color}</strong></div>
              <div><span>Body color</span><strong>${car.body_color}</strong></div>
              <div><span>Window color</span><strong>${car.window_color}</strong></div>
              <div><span>Interior color</span><strong>${car.interior_color}</strong></div>
              <div><span>Base material</span><strong>${car.base_material}</strong></div>
            </div>
            <div class="card-actions">
              <button class="select-btn" data-id="${car.id}">Selecionar</button>
              <button class="download-card-btn" data-id="${car.id}" title="Salvar card como imagem">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                Salvar Card
              </button>
            </div>
          </div>
        `;
        catalog.appendChild(card);
      });

      const totalPages = Math.ceil(filteredCars.length / itemsPerPage);
      renderPagination(totalPages);
    };

    const applyFilter = (searchTerm) => {
      searchFilter = searchTerm.toLowerCase().trim();
      if (searchFilter) {
        filteredCars = cars.filter((car) =>
          car.name.toLowerCase().includes(searchFilter)
        );
        clearFilterBtn.style.display = 'inline-block';
      } else {
        filteredCars = [...cars];
        clearFilterBtn.style.display = 'none';
      }
      currentPage = 1;
      renderPage(currentPage);
      updateCardSelectionState();
    };

    searchInput.addEventListener('input', (event) => {
      applyFilter(event.target.value);
    });

    clearFilterBtn.addEventListener('click', () => {
      searchInput.value = '';
      applyFilter('');
      searchInput.focus();
    });


    const downloadCardAsImage = async (cardElement, carName) => {
      const actionsContainer = cardElement.querySelector('.card-actions');
      if (actionsContainer) {
        actionsContainer.style.display = 'none';
      }

      const originalTransform = cardElement.style.transform;
      const originalTransition = cardElement.style.transition;

      cardElement.style.transform = 'none';
      cardElement.style.transition = 'none';

      try {
        const canvas = await html2canvas(cardElement, {
          useCORS: true,
          scale: 2,
          backgroundColor: '#0b1124' // solid dark theme background for text contrast
        });

        if (actionsContainer) {
          actionsContainer.style.display = 'flex';
        }
        cardElement.style.transform = originalTransform;
        cardElement.style.transition = originalTransition;

        const url = canvas.toDataURL('image/png');
        const a = document.createElement('a');

        const cleanName = String(carName)
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, '-')
          .replace(/(^-|-$)/g, '');

        a.href = url;
        a.download = `hotwheels-${cleanName}.png`;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
      } catch (error) {
        console.error('Erro ao gerar imagem do card:', error);
        alert('Não foi possível salvar o card como imagem.');

        if (actionsContainer) {
          actionsContainer.style.display = 'flex';
        }
        cardElement.style.transform = originalTransform;
        cardElement.style.transition = originalTransition;
      }
    };

    const generateCardElement = (car) => {
      const card = document.createElement('article');
      card.className = 'car-card';

      const borderClass = getSpecialBorderClass(car);
      if (borderClass) {
        card.classList.add(borderClass);
      }

      const badgeLabel = getSpecialBadgeLabel(car);
      const badgeClass = badgeLabel ? getSpecialBadgeClass(car) : '';
      const badgeMarkup = badgeLabel ? `<span class="special-badge ${badgeClass}">${badgeLabel}</span>` : '';

      card.innerHTML = `
        <div class="car-card__image" style="background-image: url('${car.image}');" role="img" aria-label="${car.name}"></div>
        <div class="card-body">
          <div class="card-top">
            <div>
              <p class="card-category">${car.segment}</p>
              <h3>${car.name}</h3>
            </div>
            <span class="price">${formatPrice(car.price)}</span>
          </div>
          ${badgeMarkup}
          <div class="spec-grid">
            <div><span>Release</span><strong>${car.release_year}</strong></div>
            <div><span>Assortment</span><strong>${car.assortment}</strong></div>
            <div><span>Series</span><strong>${car.series}</strong></div>
            <div><span>Scale</span><strong>${car.scale}</strong></div>
            <div><span>Base color</span><strong>${car.base_color}</strong></div>
            <div><span>Body color</span><strong>${car.body_color}</strong></div>
            <div><span>Window color</span><strong>${car.window_color}</strong></div>
            <div><span>Interior color</span><strong>${car.interior_color}</strong></div>
            <div><span>Base material</span><strong>${car.base_material}</strong></div>
          </div>
        </div>
      `;
      return card;
    };

    const downloadSelectedCardsAsImages = async () => {
      if (!selectedCars.length) return;

      const originalText = downloadImagesBtn.textContent;
      downloadImagesBtn.disabled = true;

      const tempContainer = document.createElement('div');
      tempContainer.style.position = 'absolute';
      tempContainer.style.left = '-9999px';
      tempContainer.style.top = '0';
      tempContainer.style.width = '320px';
      document.body.appendChild(tempContainer);

      try {
        if (selectedCars.length === 1) {
          const car = selectedCars[0];
          downloadImagesBtn.textContent = 'Gerando card...';

          const cardElement = generateCardElement(car);
          tempContainer.appendChild(cardElement);

          const canvas = await html2canvas(cardElement, {
            useCORS: true,
            scale: 2,
            backgroundColor: '#0b1124'
          });

          const url = canvas.toDataURL('image/png');
          const a = document.createElement('a');
          const cleanName = String(car.name).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
          a.href = url;
          a.download = `hotwheels-${cleanName}.png`;
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
        } else {
          const zip = new JSZip();
          const usedNames = {};

          for (let i = 0; i < selectedCars.length; i++) {
            const car = selectedCars[i];
            downloadImagesBtn.textContent = `Gerando (${i + 1}/${selectedCars.length})`;

            const cardElement = generateCardElement(car);
            tempContainer.appendChild(cardElement);

            const canvas = await html2canvas(cardElement, {
              useCORS: true,
              scale: 2,
              backgroundColor: '#0b1124'
            });

            const blob = await new Promise((resolve) => canvas.toBlob(resolve, 'image/png'));
            let cleanName = String(car.name).toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');

            if (usedNames[cleanName]) {
              usedNames[cleanName]++;
              cleanName = `${cleanName}-${usedNames[cleanName]}`;
            } else {
              usedNames[cleanName] = 1;
            }

            zip.file(`hotwheels-${cleanName}.png`, blob);

            tempContainer.removeChild(cardElement);
            await new Promise((r) => setTimeout(r, 50));
          }

          downloadImagesBtn.textContent = 'Criando ZIP...';
          const content = await zip.generateAsync({ type: 'blob' });

          const url = URL.createObjectURL(content);
          const a = document.createElement('a');
          a.href = url;
          a.download = 'hotwheels_cards_selecionados.zip';
          document.body.appendChild(a);
          a.click();
          document.body.removeChild(a);
          URL.revokeObjectURL(url);
        }
      } catch (error) {
        console.error('Erro ao gerar imagens dos cards:', error);
        alert('Ocorreu um erro ao baixar as imagens dos cards.');
      } finally {
        document.body.removeChild(tempContainer);
        downloadImagesBtn.textContent = originalText;
        downloadImagesBtn.disabled = false;
      }
    };

    const toggleSelection = (car) => {
      const exists = selectedCars.some((item) => item.id === car.id);
      if (exists) {
        selectedCars = selectedCars.filter((item) => item.id !== car.id);
      } else {
        selectedCars = [...selectedCars, car];
      }

      renderSelectedCars();
      updateCardSelectionState();
      carSelect.value = '';
    };

    const updateCardSelectionState = () => {
      document.querySelectorAll('.car-card').forEach((card) => {
        const button = card.querySelector('.select-btn');
        const carId = button?.dataset.id;
        const isSelected = selectedCars.some((item) => item.id === carId);
        card.classList.toggle('is-selected', isSelected);
        button.textContent = isSelected ? 'Selecionado' : 'Selecionar';
      });
    };

    carSelect.addEventListener('change', (event) => {
      const car = cars.find((item) => item.id === event.target.value);
      if (car) {
        toggleSelection(car);
        const carIndex = cars.findIndex((item) => item.id === car.id);
        if (carIndex !== -1) {
          const targetPage = Math.floor(carIndex / itemsPerPage) + 1;
          if (targetPage !== currentPage) {
            renderPage(targetPage);
            updateCardSelectionState();
          }
        }
      }
    });

    catalog.addEventListener('click', async (event) => {
      const selectBtn = event.target.closest('.select-btn');
      if (selectBtn) {
        const car = cars.find((item) => item.id === selectBtn.dataset.id);
        if (car) {
          toggleSelection(car);
        }
        return;
      }

      const downloadBtn = event.target.closest('.download-card-btn');
      if (downloadBtn) {
        const card = downloadBtn.closest('.car-card');
        if (card) {
          const car = cars.find((item) => item.id === downloadBtn.dataset.id);
          await downloadCardAsImage(card, car ? car.name : 'carrinho');
        }
      }
    });

    whatsappBtn.addEventListener('click', () => {
      if (!selectedCars.length) return;
      const message = encodeURIComponent(`Olá! Gostaria de solicitar os seguintes Hot Wheels:\n\n${buildSelectionText()}`);
      window.open(`https://wa.me/?text=${message}`, '_blank', 'noopener,noreferrer');
    });

    downloadBtn.addEventListener('click', () => {
      exportToExcel();
    });

    selectAllBtn.addEventListener('click', () => {
      selectedCars = [...cars];
      carSelect.value = '';
      renderSelectedCars();
      updateCardSelectionState();
    });

    clearSelectionBtn.addEventListener('click', () => {
      selectedCars = [];
      carSelect.value = '';
      renderSelectedCars();
      updateCardSelectionState();
    });

    selectAllPageBtn.addEventListener('click', () => {
      const startIndex = (currentPage - 1) * itemsPerPage;
      const endIndex = Math.min(startIndex + itemsPerPage, filteredCars.length);
      const visibleCars = filteredCars.slice(startIndex, endIndex);

      visibleCars.forEach((car) => {
        if (!selectedCars.some((item) => item.id === car.id)) {
          selectedCars.push(car);
        }
      });

      carSelect.value = '';
      renderSelectedCars();
      updateCardSelectionState();
    });

    downloadImagesBtn.addEventListener('click', () => {
      downloadSelectedCardsAsImages();
    });

    const init = async () => {
      try {
        catalog.innerHTML = '<p class="empty-selection">Carregando catálogo...</p>';
        const response = await fetch('cars.json');
        if (!response.ok) {
          throw new Error('Falha ao carregar o arquivo JSON.');
        }
        cars = await response.json();
        // Atribuir IDs únicos baseados no índice para diferenciar duplicatas
        cars.forEach((car, index) => {
          car.id = `car-${index}`;
        });
        filteredCars = [...cars];

        populateDropdown();
        renderPage(1);
        renderSelectedCars();
        updateCardSelectionState();
      } catch (error) {
        console.error('Erro ao inicializar o catálogo:', error);
        catalog.innerHTML = '<p class="empty-selection" style="color: #ff4d4d;">Erro ao carregar os dados do catálogo. Por favor, tente novamente.</p>';
      }
    };

    init();
  </script>
</body>

</html>
